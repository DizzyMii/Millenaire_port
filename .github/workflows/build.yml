name: Build & GameTest

on:
  push:
    branches: [ "main", "feat/**", "fix/**", "chore/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and run GameTests
        run: ./gradlew build
        env:
          # Allow NeoForge/Minecraft artifact downloads
          GRADLE_OPTS: "-Xmx4g"
